name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test – validate (clean fixture)
        run: |
          node dist/cli.js validate \
            --tokens examples/sample-design-system/tokens.css \
            --scan examples/test-components/GoodComponent.css \
            --exit-on-error

      - name: Smoke test – dqs
        run: |
          node dist/cli.js dqs \
            --tokens examples/sample-design-system/tokens.css \
            --components examples/sample-design-system/components.json \
            --scan examples/test-components/GoodComponent.css

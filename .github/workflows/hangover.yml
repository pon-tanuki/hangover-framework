name: HANGOVER Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  dqs:
    name: Design Quality Score
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile Design System Spec
        run: |
          npm run hangover:compile -- \
            --tokens examples/sample-design-system/tokens.css \
            --components examples/sample-design-system/components.json \
            --guidelines examples/sample-design-system/guidelines.md \
            --output examples/sample-design-system/design-system.context.md

      - name: Run Token Validator
        id: validate
        run: |
          npm run hangover:validate -- \
            --tokens examples/sample-design-system/tokens.css \
            --scan src/ 2>&1 | tee token-report.txt
        continue-on-error: true

      - name: Run DQS
        id: dqs
        run: |
          npm run hangover:dqs -- \
            --tokens examples/sample-design-system/tokens.css \
            --components examples/sample-design-system/components.json \
            --scan src/ \
            --output dqs-result.json \
            2>&1 | tee dqs-report.txt
        continue-on-error: true

      - name: Post DQS comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read DQS result
            let result, overall, grade, gradeEmoji;
            try {
              result = JSON.parse(fs.readFileSync('dqs-result.json', 'utf-8'));
              overall = result.overall;
              const config = JSON.parse(fs.readFileSync('hangover.config.json', 'utf-8'));
              const threshold = config.threshold ?? 80;
              grade = overall >= threshold ? 'PASS' : overall >= threshold * 0.75 ? 'MARGINAL' : 'FAIL';
              gradeEmoji = overall >= threshold ? '✅' : overall >= threshold * 0.75 ? '⚠️' : '❌';
            } catch {
              overall = 0;
              grade = 'ERROR';
              gradeEmoji = '🔴';
              result = { dimensions: [], availableDimensions: 0, totalDimensions: 0 };
            }

            // Build dimension table
            const dimRows = (result.dimensions ?? []).map(d => {
              const score = d.score !== null ? `${d.score}/100` : 'N/A';
              const icon = d.score === null ? '—' : d.score >= 80 ? '✅' : d.score >= 60 ? '⚠️' : '❌';
              return `| ${icon} | **${d.name}** | ${score} | ${d.details} |`;
            }).join('\n');

            // Read token report summary (last line)
            let tokenSummary = '';
            try {
              const tokenReport = fs.readFileSync('token-report.txt', 'utf-8');
              const lines = tokenReport.trim().split('\n');
              tokenSummary = lines.find(l => l.startsWith('Total:')) ?? '';
            } catch {}

            const body = [
              `## 🍺 HANGOVER DQS Report`,
              ``,
              `**Overall Score: ${overall}/100 ${gradeEmoji} ${grade}**`,
              `> Based on ${result.availableDimensions ?? 0} of ${result.totalDimensions ?? 0} dimensions`,
              ``,
              `| | Dimension | Score | Details |`,
              `|--|-----------|-------|---------|`,
              dimRows,
              ``,
              tokenSummary ? `**Token Validator:** ${tokenSummary}` : '',
              ``,
              `<details>`,
              `<summary>Design Review Checklist</summary>`,
              ``,
              `**ビジュアル**`,
              `- [ ] ビジュアルヒエラルキーは適切か`,
              `- [ ] ブランドガイドラインに沿っているか`,
              `- [ ] ダークモードで問題ないか`,
              ``,
              `**インタラクション**`,
              `- [ ] loading / error / empty の3状態が実装されているか`,
              `- [ ] ホバー・フォーカス・アクティブの状態スタイルがあるか`,
              ``,
              `**AI生成特有**`,
              `- [ ] 既存コンポーネントを再利用しているか`,
              `- [ ] \`<div onClick>\` ではなく \`<button>\` を使っているか`,
              `- [ ] エラーハンドリングがハッピーパスだけでないか`,
              ``,
              `</details>`,
              ``,
              `---`,
              `*Generated by [HANGOVER Framework](../../docs/hangover-framework.md)*`,
            ].filter(l => l !== undefined).join('\n');

            // Find existing HANGOVER comment to update (avoid duplicate comments)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' && c.body?.includes('HANGOVER DQS Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Record to Consistency Tracker
        run: |
          if [ -f dqs-result.json ]; then
            npm run hangover:track -- \
              --dqs dqs-result.json \
              --log hangover.log.json \
              --label "PR #${{ github.event.pull_request.number }}"
          fi
        continue-on-error: true

      - name: Upload DQS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hangover-dqs-${{ github.sha }}
          path: |
            dqs-result.json
            token-report.txt
            dqs-report.txt
          retention-days: 30

      - name: Enforce DQS threshold
        run: |
          SCORE=$(node -e "const r=require('./dqs-result.json'); console.log(r.overall)" 2>/dev/null || echo 0)
          THRESHOLD=$(node -e "const c=require('./hangover.config.json'); console.log(c.threshold ?? 80)")
          echo "DQS Score: $SCORE / threshold: $THRESHOLD"
          if [ "$SCORE" -lt "$THRESHOLD" ]; then
            echo "❌ DQS $SCORE is below threshold $THRESHOLD. Merge blocked."
            exit 1
          fi
          echo "✅ DQS $SCORE passes threshold."

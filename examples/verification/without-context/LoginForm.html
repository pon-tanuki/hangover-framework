<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login Form - Without Context</title>
  <style>
    body { font-family: Inter, -apple-system, sans-serif; background: #f3f4f6; }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { background: #ffffff; border-radius: 12px; padding: 40px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h1 { font-size: 24px; font-weight: 700; color: #111827; text-align: center; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 32px; }
    label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .forgot { text-align: center; margin-top: 16px; }
    .forgot a { color: #3b82f6; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1>ログイン</h1>
      <p>アカウントにサインインしてください</p>
      <form>
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="example@example.com">
        </div>
        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" placeholder="8文字以上">
        </div>
        <button type="submit">ログイン</button>
      </form>
      <div class="forgot">
        <a href="/forgot-password">パスワードを忘れた方はこちら</a>
      </div>
    </div>
  </div>
</body>
</html>
